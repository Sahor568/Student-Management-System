<div class="table-container">
  @if (data.length > 0) {
    <p-table [value]="data" [tableStyle]="{ 'min-width': '50rem' }" removableSort [paginator]="true" [rows]="5"
             [rowsPerPageOptions]="[5, 10, 20]" class="table">
      <ng-template #header>
        <tr>
          @for (col of columns; track col.field) {
            <th [pSortableColumn]="col.field">
              {{ col.header }}
              <p-sortIcon [field]="col.field"></p-sortIcon>
            </th>
          }
          <th>Actions</th>
        </tr>
      </ng-template>

      <ng-template #body let-item>
        <tr>
          @for (col of columns; track col.field) {
            <td>{{ item[col.field] }}</td>
          }
          <td>
            <p-button [outlined]="true" label="View" (click)="viewItem.emit(item)"/>
            <p-button [outlined]="true" label="Edit" (click)="editItem.emit(item)"/>
            <p-button [outlined]="true" label="Delete" severity="danger" (click)="deleteItem.emit(item.id)"/>
          </td>
        </tr>
      </ng-template>
    </p-table>
  } @else {
    <div class="empty-state">
      <p>{{ emptyMessage }}</p>
    </div>
  }
</div>
