<app-confirm-dialog
  #confirmDialog
  message="Are you sure you want to delete this teacher?"
  header="Delete Teacher"
  acceptLabel="Delete"
  acceptSeverity="danger"
  (accept)="onDeleteAccept()"
  (reject)="onDeleteReject()"
/>

<div class="teacher-view-container">
  <div class="form-header">
    <h1>Teacher Detail</h1>
    <p>Here you can see the teacher's details.</p>
  </div>

  <div class="teacher-card">
    <div class="card-title">Teacher Information</div>

    <div class="field">
      <label>Teacher ID: </label>
      <input [value]="teacher()!.userId" disabled />
    </div>

    <div class="field">
      <label>Full Name: </label>
      <input [value]="teacher()!.firstName + ' ' + teacher()!.lastName" disabled />
    </div>

    <div class="field">
      <label>Email: </label>
      <input [value]="teacher()!.email" disabled />
    </div>

    <div class="field">
      <label>Phone Number: </label>
      <input [value]="teacher()!.phone" disabled />
    </div>

    <div class="field">
      <label>Address: </label>
      <input [value]="teacher()!.address" disabled />
    </div>

    <div class="field">
      <label>Status: </label>
      <input [value]="teacher()!.status" disabled />
    </div>
  </div>

  <div class="teacher-action">
    <p-button [outlined]="true" label="Edit" [routerLink]="['/teacher', teacher()!.id]" />
    <p-button [outlined]="true" label="Delete" severity="danger" (click)="deleteTeacher(teacher()!)" />
  </div>
</div>
